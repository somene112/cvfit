<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI CV Fit Analyzer</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<header class="topbar">
  <div>
    <h2>AI CV Fit Analyzer</h2>
    <p>AI-Powered Hiring Insights</p>
  </div>

  <button class="logout-btn">Logout</button>
</header>

<main class="dashboard-grid">

  <section class="left-panel">

    <div class="card">
      <h3>📄 Upload CV</h3>

      <label class="upload-box">
        <input type="file" id="cvFile" hidden />

        <div class="upload-content">
          <div class="upload-icon">☁️</div>
          <p>Drop your CV here or click to browse</p>
          <span>Support PDF, DOCX (Max 10MB)</span>
        </div>
      </label>
    </div>

    <div class="card">
      <h3>📋 Job Description</h3>

      <textarea
        id="jobDescription"
        placeholder="Paste the job requirements, responsibilities, and qualifications here..."
      ></textarea>
    </div>

    <button id="analyzeBtn" class="analyze-btn">
      Analyze CV
    </button>

    <div id="loadingState" class="loading-state hidden">
      <div class="spinner"></div>
      <p>Analyzing CV...</p>
    </div>

    <div id="errorState" class="error-state hidden"></div>

  </section>

  <aside class="right-panel">

    <div class="info-card">
      <h3>Why use AI analysis?</h3>

      <ul>
        <li>Instantly identify skill gaps relative to the role.</li>
        <li>Get actionable advice to improve your candidate fit score.</li>
        <li>Optimized for modern Applicant Tracking Systems (ATS).</li>
      </ul>
    </div>

  </aside>

</main>

<script src="/static/app.js"></script>
</body>
</html>
