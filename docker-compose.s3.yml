services:
  api:
    environment:
      - STORAGE_BACKEND=s3
      - STORAGE_ROOT=/data
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_PREFIX=${S3_PREFIX:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_USE_IAM_ROLE=${AWS_USE_IAM_ROLE:-false}

  worker:
    environment:
      - STORAGE_BACKEND=s3
      - STORAGE_ROOT=/data
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_PREFIX=${S3_PREFIX:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_USE_IAM_ROLE=${AWS_USE_IAM_ROLE:-false}
