name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DATABASE_URL: "sqlite+pysqlite:///:memory:"
  REDIS_URL: "redis://localhost:6379/0"
  PYTHONPYCACHEPREFIX: ${{ github.workspace }}/backend/pytest-cache-files-local/pycache-prefix
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/requirements-ml.txt

      - name: Install backend dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Guard tracked generated files
        run: python scripts/ci_guard.py

      - name: Compile backend
        run: python -m compileall backend/app

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest --basetemp pytest-cache-files-local -p no:cacheprovider

      - name: Check Alembic heads
        working-directory: backend
        run: alembic heads

      - name: Check Alembic history
        working-directory: backend
        run: alembic history

      - name: Validate Docker Compose config
        run: docker compose config
