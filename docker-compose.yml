services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cvfit
      POSTGRES_PASSWORD: cvfit
      POSTGRES_DB: cvfit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg2://cvfit:cvfit@postgres:5432/cvfit
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ROOT=/data
    volumes:
      - ./data:/data
      - ./app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg2://cvfit:cvfit@postgres:5432/cvfit
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ROOT=/data
    volumes:
      - ./data:/data
      - ./app:/app/app
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: